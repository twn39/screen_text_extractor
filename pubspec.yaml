name: screen_text_extractor
description: This plugin allows Flutter desktop apps to extract text from screen.
version: 1.0.0
homepage: https://github.com/twn39/screen_text_extractor

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  clipboard_watcher: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  dependency_validator: ^5.0.5

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: ScreenTextExtractorPlugin
      macos:
        pluginClass: ScreenTextExtractorPlugin
      windows:
        pluginClass: ScreenTextExtractorPlugin
